services:
  - type: web
    name: ladybugnodes
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
    disk:
      name: ladybugnodes-data
      mountPath: /opt/render/project/data
      sizeGB: 1
