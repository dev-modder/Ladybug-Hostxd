# ─────────────────────────────────────────────────────────────
#  render.yaml — Ladybug-Mini Hosting Platform
#  Deploy this file on Render.com (free tier)
# ─────────────────────────────────────────────────────────────

services:
  - type: web
    name: ladybug-mini-host
    runtime: node
    plan: free

    # Root directory of THIS hosting repo (not the bot itself)
    rootDir: .

    buildCommand: |
      npm install --omit=dev &&
      git clone https://github.com/dev-modder/Ladybug-Mini ../Ladybug-Mini &&
      cd ../Ladybug-Mini &&
      PUPPETEER_SKIP_DOWNLOAD=true PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true npm install --omit=dev

    startCommand: node server.js

    healthCheckPath: /health

    autoDeploy: true

    envVars:
      # Render injects PORT automatically — do not set it here
      - key: NODE_ENV
        value: production

      # ── Set these in the Render dashboard (Environment tab) ──────────────
      - key: RENDER_URL
        sync: false           # Set manually: https://your-service.onrender.com

      - key: SESSION_ID
        sync: false           # Your KnightBot session string

      - key: OWNER_NUMBER
        sync: false           # e.g. 2637868310191

      - key: BOT_NAME
        value: Ladybug Bot Mini

      - key: PREFIX
        value: "."

      - key: TIMEZONE
        value: Asia/Kolkata

      - key: PING_INTERVAL
        value: "14"           # minutes — keeps free tier alive

      - key: CLEANUP_INTERVAL
        value: "30"           # minutes — auto temp-file cleanup

      - key: DASHBOARD_PIN
        sync: false           # Optional: protect dashboard with a PIN

      # Optional API keys
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPAI_API_KEY
        sync: false
      - key: REMOVE_BG_API_KEY
        sync: false
