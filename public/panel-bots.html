<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LADYBUGNODES · Panel Bots</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0b0e; --surface: #111318; --surface2: #181c22; --border: #1e242e;
      --red: #ff3b5c; --red-dim: rgba(255,59,92,0.12);
      --green: #00e676; --green-dim: rgba(0,230,118,0.10);
      --amber: #ffab40; --amber-dim: rgba(255,171,64,0.12);
      --blue: #40c4ff; --blue-dim: rgba(64,196,255,0.10);
      --purple: #b388ff; --purple-dim: rgba(179,136,255,0.10);
      --gold: #ffd700; --gold-dim: rgba(255,215,0,0.12);
      --muted: #4a5568; --text: #e2e8f0; --text-dim: #718096;
      --font-mono: 'JetBrains Mono', monospace; --font-sans: 'Syne', sans-serif;
      --radius: 12px;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-sans); min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(255,59,92,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,59,92,0.025) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; z-index: 0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }
    
    header { border-bottom: 1px solid var(--border); background: rgba(10,11,14,0.92); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 0; flex-wrap: wrap; }
    .logo { display: flex; align-items: center; gap: 14px; }
    .logo-icon { width: 44px; height: 44px; background: var(--red-dim); border: 1px solid rgba(255,59,92,0.3); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .logo-text h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; }
    .logo-text h1 span { color: var(--red); }
    .logo-text p { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); margin-top: 3px; }
    
    .nav-tabs { display: flex; gap: 4px; }
    .nav-tab { padding: 10px 18px; background: transparent; border: 1px solid transparent; border-radius: 8px; color: var(--text-dim); font-family: var(--font-sans); font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.2s; }
    .nav-tab:hover { background: var(--surface); color: var(--text); }
    .nav-tab.active { background: var(--surface); border-color: var(--border); color: var(--red); }
    
    .user-info { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; font-family: var(--font-mono); font-size: 12px; }
    #user-name { color: var(--text); font-weight: 600; }
    
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; border: none; font-family: var(--font-sans); font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.97); }
    .btn-start { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,230,118,0.25); }
    .btn-stop { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,59,92,0.25); }
    .btn-restart { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(64,196,255,0.25); }
    .btn-edit { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(255,171,64,0.25); }
    .btn-add { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(179,136,255,0.25); }
    .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,59,92,0.25); }
    .btn-logout { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
    
    main { padding: 32px 0 60px; }
    .section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); margin: 36px 0 16px; display: flex; align-items: center; gap: 10px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    
    .bots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .bot-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; transition: border-color 0.25s, transform 0.2s; position: relative; overflow: hidden; }
    .bot-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--purple), var(--blue)); opacity: 0.5; }
    .bot-card:hover { border-color: var(--muted); transform: translateY(-2px); }
    
    .bot-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .bot-name { font-weight: 700; font-size: 16px; }
    .bot-id { font-size: 10px; color: var(--text-dim); font-family: var(--font-mono); margin-top: 2px; }
    .bot-desc { font-size: 12px; color: var(--text-dim); margin-bottom: 16px; line-height: 1.5; }
    
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
    .badge::before { content: ''; width: 7px; height: 7px; border-radius: 50%; }
    .badge.running { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,230,118,0.25); }
    .badge.running::before { background: var(--green); animation: blink 1.5s ease-in-out infinite; }
    .badge.stopped { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(255,171,64,0.25); }
    .badge.stopped::before { background: var(--amber); }
    .badge.crashed { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,59,92,0.25); }
    .badge.crashed::before { background: var(--red); }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    
    .bot-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
    .bot-controls .btn { padding: 7px 12px; font-size: 11px; }
    
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; visibility: hidden; transition: all 0.3s; }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; transform: translateY(20px); transition: transform 0.3s; }
    .modal-overlay.active .modal { transform: translateY(0); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border); background: var(--surface2); }
    .modal-title { font-weight: 700; font-size: 16px; }
    .modal-close { background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; line-height: 1; }
    .modal-body { padding: 20px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; padding: 18px 20px; border-top: 1px solid var(--border); background: var(--surface2); }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; font-family: var(--font-mono); }
    .form-input { width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font-mono); font-size: 13px; transition: border-color 0.2s; outline: none; }
    .form-input:focus { border-color: var(--purple); }
    
    .empty-state { text-align: center; padding: 60px 20px; grid-column: 1 / -1; }
    .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .empty-state-desc { font-size: 13px; color: var(--text-dim); font-family: var(--font-mono); }
    
    #toast { position: fixed; bottom: 28px; right: 28px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
    .toast-item { padding: 12px 18px; border-radius: 10px; font-family: var(--font-mono); font-size: 13px; animation: slideIn 0.3s ease; max-width: 340px; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .toast-item.ok { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,230,118,0.25); }
    .toast-item.error { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,59,92,0.25); }
    .toast-item.warn { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(255,171,64,0.25); }
  </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
  <header>
    <div class="container header-inner">
      <div class="logo">
        <div class="logo-icon">🐝</div>
        <div class="logo-text">
          <h1>LADYBUG<span>NODES</span></h1>
          <p>Panel Bot Manager</p>
        </div>
      </div>
      <nav class="nav-tabs">
        <a href="/" class="nav-tab">Dashboard</a>
        <a href="/panel-bots.html" class="nav-tab active">Panel Bots</a>
      </nav>
      <div class="user-info">
        <span id="user-name">—</span>
        <button class="btn btn-logout" onclick="logout()">Logout</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="controls" style="margin-bottom: 20px;">
      <button class="btn btn-add" onclick="openUploadModal()">📤 Upload Bot</button>
    </div>

    <div class="section-title">Uploaded Panel Bots</div>
    <div class="bots-grid" id="bots-container">
      <div class="empty-state">
        <div class="empty-state-icon">📦</div>
        <div class="empty-state-title">No panel bots uploaded</div>
        <div class="empty-state-desc">Click "Upload Bot" to add your custom bot</div>
      </div>
    </div>
  </main>

  <!-- Upload Modal -->
  <div class="modal-overlay" id="upload-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">📤 Upload Panel Bot</span>
        <button class="modal-close" onclick="closeUploadModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="upload-form" enctype="multipart/form-data">
          <div class="form-group">
            <label class="form-label">Bot Name *</label>
            <input type="text" class="form-input" id="bot-name" placeholder="My Awesome Bot" required />
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <input type="text" class="form-input" id="bot-description" placeholder="A brief description of your bot" />
          </div>
          <div class="form-group">
            <label class="form-label">Entry Point</label>
            <input type="text" class="form-input" id="bot-entry" placeholder="index.js" value="index.js" />
          </div>
          <div class="form-group">
            <label class="form-label">Bot ZIP File *</label>
            <input type="file" class="form-input" id="bot-zip" accept=".zip" required />
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-stop" onclick="closeUploadModal()">Cancel</button>
        <button class="btn btn-start" onclick="uploadBot()">Upload Bot</button>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">✏️ Edit Panel Bot</span>
        <button class="modal-close" onclick="closeEditModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-bot-id" />
        <div class="form-group">
          <label class="form-label">Bot Name</label>
          <input type="text" class="form-input" id="edit-bot-name" />
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <input type="text" class="form-input" id="edit-bot-description" />
        </div>
        <div class="form-group">
          <label class="form-label">Entry Point</label>
          <input type="text" class="form-input" id="edit-bot-entry" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-stop" onclick="closeEditModal()">Cancel</button>
        <button class="btn btn-start" onclick="saveBot()">Save Changes</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const token = localStorage.getItem('lbn_token');
    if (!token) location.href = '/login';
    
    let currentUser = JSON.parse(localStorage.getItem('lbn_user') || '{}');
    let panelBots = [];
    
    function authHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
    }
    
    function logout() {
      localStorage.removeItem('lbn_token');
      localStorage.removeItem('lbn_user');
      location.href = '/login';
    }
    
    document.getElementById('user-name').textContent = currentUser.username || '—';
    
    async function fetchPanelBots() {
      try {
        const r = await fetch('/api/panel-bots', { headers: authHeaders() });
        if (r.status === 401) { logout(); return; }
        panelBots = await r.json();
        renderBots();
      } catch (err) {
        toast('Error loading bots: ' + err.message, 'error');
      }
    }
    
    function renderBots() {
      const container = document.getElementById('bots-container');
      
      if (!panelBots.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📦</div><div class="empty-state-title">No panel bots uploaded</div><div class="empty-state-desc">Click "Upload Bot" to add your custom bot</div></div>';
        return;
      }
      
      container.innerHTML = panelBots.map(bot => '<div class="bot-card" data-id="' + bot.id + '"><div class="bot-header"><div><div class="bot-name">' + escHtml(bot.name) + '</div><div class="bot-id">' + bot.id.slice(0, 12) + '…</div></div><span class="badge ' + (bot.status || 'stopped') + '">' + (bot.status || 'stopped') + '</span></div><div class="bot-desc">' + escHtml(bot.description || 'No description') + '</div><div style="font-size: 11px; color: var(--text-dim); font-family: var(--font-mono);">Entry: ' + escHtml(bot.entryPoint || 'index.js') + '<br>Owner: ' + escHtml(bot.ownerUsername || 'Unknown') + '<br>Created: ' + new Date(bot.createdAt).toLocaleDateString() + '</div><div class="bot-controls">' + (bot.status !== 'running' &amp;&amp; bot.status !== 'starting' ? '<button class="btn btn-start" onclick="startBot(\'' + bot.id + '\')">▶ Start</button>' : '') + (bot.status === 'running' || bot.status === 'starting' ? '<button class="btn btn-stop" onclick="stopBot(\'' + bot.id + '\')">■ Stop</button>' : '') + '<button class="btn btn-restart" onclick="restartBot(\'' + bot.id + '\')">↺ Restart</button><button class="btn btn-edit" onclick="editBot(\'' + bot.id + '\')">✏ Edit</button><button class="btn btn-danger" onclick="deleteBot(\'' + bot.id + '\')">🗑</button></div></div>').join('');
    }
    
    function openUploadModal() { document.getElementById('upload-modal').classList.add('active'); }
    function closeUploadModal() { document.getElementById('upload-modal').classList.remove('active'); document.getElementById('upload-form').reset(); }
    
    async function uploadBot() {
      const name = document.getElementById('bot-name').value.trim();
      const description = document.getElementById('bot-description').value.trim();
      const entryPoint = document.getElementById('bot-entry').value.trim() || 'index.js';
      const zipFile = document.getElementById('bot-zip').files[0];
      
      if (!name || !zipFile) { toast('Name and ZIP file are required', 'error'); return; }
      
      const formData = new FormData();
      formData.append('name', name);
      formData.append('description', description);
      formData.append('entryPoint', entryPoint);
      formData.append('botZip', zipFile);
      
      try {
        toast('Uploading bot...', 'ok');
        const r = await fetch('/api/panel-bots/upload', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: formData });
        const d = await r.json();
        if (d.ok) { toast('Bot "' + name + '" uploaded successfully!', 'ok'); closeUploadModal(); fetchPanelBots(); }
        else { toast(d.error || 'Failed to upload bot', 'error'); }
      } catch (err) { toast('Error: ' + err.message, 'error'); }
    }
    
    function editBot(id) {
      const bot = panelBots.find(b => b.id === id);
      if (!bot) return;
      document.getElementById('edit-bot-id').value = id;
      document.getElementById('edit-bot-name').value = bot.name || '';
      document.getElementById('edit-bot-description').value = bot.description || '';
      document.getElementById('edit-bot-entry').value = bot.entryPoint || 'index.js';
      document.getElementById('edit-modal').classList.add('active');
    }
    
    function closeEditModal() { document.getElementById('edit-modal').classList.remove('active'); }
    
    async function saveBot() {
      const id = document.getElementById('edit-bot-id').value;
      const data = { name: document.getElementById('edit-bot-name').value.trim(), description: document.getElementById('edit-bot-description').value.trim(), entryPoint: document.getElementById('edit-bot-entry').value.trim() };
      try {
        const r = await fetch('/api/panel-bots/' + id, { method: 'PUT', headers: authHeaders(), body: JSON.stringify(data) });
        const d = await r.json();
        if (d.ok) { toast('Bot updated', 'ok'); closeEditModal(); fetchPanelBots(); }
        else { toast(d.error || 'Failed to update', 'error'); }
      } catch (err) { toast('Error: ' + err.message, 'error'); }
    }
    
    async function startBot(id) {
      try {
        const r = await fetch('/api/panel-bots/' + id + '/start', { method: 'POST', headers: authHeaders() });
        const d = await r.json();
        if (d.ok) { toast('Bot starting… (5 coins deducted)', 'ok'); setTimeout(fetchPanelBots, 2000); }
        else { toast(d.error || 'Failed to start', 'error'); }
      } catch (err) { toast('Error: ' + err.message, 'error'); }
    }
    
    async function stopBot(id) {
      try {
        const r = await fetch('/api/panel-bots/' + id + '/stop', { method: 'POST', headers: authHeaders() });
        const d = await r.json();
        if (d.ok) { toast('Bot stopping…', 'ok'); setTimeout(fetchPanelBots, 1000); }
      } catch (err) { toast('Error: ' + err.message, 'error'); }
    }
    
    async function restartBot(id) {
      try {
        const r = await fetch('/api/panel-bots/' + id + '/restart', { method: 'POST', headers: authHeaders() });
        const d = await r.json();
        if (d.ok) { toast('Bot restarting…', 'ok'); setTimeout(fetchPanelBots, 2000); }
      } catch (err) { toast('Error: ' + err.message, 'error'); }
    }
    
    async function deleteBot(id) {
      if (!confirm('Delete this bot permanently?')) return;
      try {
        const r = await fetch('/api/panel-bots/' + id, { method: 'DELETE', headers: authHeaders() });
        const d = await r.json();
        if (d.ok) { toast('Bot deleted', 'warn'); fetchPanelBots(); }
        else { toast(d.error || 'Failed to delete', 'error'); }
      } catch (err) { toast('Error: ' + err.message, 'error'); }
    }
    
    function toast(msg, type) { const el = document.createElement('div'); el.className = 'toast-item ' + type; el.textContent = msg; document.getElementById('toast').appendChild(el); setTimeout(() => el.remove(), 4000); }
    function escHtml(s) { return String(s).replace(/&amp;/g, '&amp;amp;').replace(/</g, '&amp;lt;').replace(/>/g, '&amp;gt;').replace(/"/g, '&amp;quot;'); }
    
    fetchPanelBots();
  </script>
</body>
</html>
