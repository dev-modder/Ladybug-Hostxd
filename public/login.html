<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LADYBUGNODES · Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0b0e;
      --surface:  #111318;
      --surface2: #181c22;
      --border:   #1e242e;
      --red:      #ff3b5c;
      --red-dim:  rgba(255,59,92,0.12);
      --green:    #00e676;
      --green-dim:rgba(0,230,118,0.10);
      --amber:    #ffab40;
      --blue:     #40c4ff;
      --purple:   #b388ff;
      --muted:    #4a5568;
      --text:     #e2e8f0;
      --text-dim: #718096;
      --font-mono: 'JetBrains Mono', monospace;
      --font-sans: 'Syne', sans-serif;
      --radius:   14px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,59,92,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,59,92,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove {
      0%   { background-position: 0 0; }
      100% { background-position: 48px 48px; }
    }

    /* Glow orbs */
    body::after {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,59,92,0.08) 0%, transparent 70%);
      pointer-events: none;
      animation: orbFloat 8s ease-in-out infinite alternate;
    }
    @keyframes orbFloat {
      0%   { transform: translate(0,0); }
      100% { transform: translate(60px,80px); }
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 60px rgba(255,59,92,0.08), 0 24px 48px rgba(0,0,0,0.4);
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--red), var(--purple), var(--blue));
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      background: var(--red-dim);
      border: 1px solid rgba(255,59,92,0.3);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 0 24px rgba(255,59,92,0.25);
      animation: pulse-red 3s ease-in-out infinite;
    }
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 16px rgba(255,59,92,0.2); }
      50%       { box-shadow: 0 0 32px rgba(255,59,92,0.45); }
    }

    .logo-text h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .logo-text h1 span { color: var(--red); }
    .logo-text p {
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      margin-top: 3px;
      letter-spacing: 0.05em;
    }

    .version-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--red-dim);
      border: 1px solid rgba(255,59,92,0.3);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 700;
      font-family: var(--font-mono);
      color: var(--red);
      letter-spacing: 0.05em;
    }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .login-sub {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 28px;
      font-family: var(--font-mono);
    }

    .form-group { margin-bottom: 18px; }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
      font-family: var(--font-mono);
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .form-input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(255,59,92,0.08);
    }
    .form-input::placeholder { color: var(--muted); }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--red), #c4002b);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: rgba(255,59,92,0.1);
      border: 1px solid rgba(255,59,92,0.25);
      border-radius: 8px;
      color: var(--red);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 10px 14px;
      margin-top: 16px;
      display: none;
    }
    .error-msg.show { display: block; }

    .success-msg {
      background: var(--green-dim);
      border: 1px solid rgba(0,230,118,0.25);
      border-radius: 8px;
      color: var(--green);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 10px 14px;
      margin-top: 16px;
      display: none;
    }
    .success-msg.show { display: block; }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--font-mono);
    }
    .footer-note a { color: var(--red); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }

    /* 2FA Section */
    .twofa-section {
      display: none;
      text-align: center;
    }
    .twofa-section.show { display: block; }
    .login-section.hide { display: none; }

    .twofa-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .twofa-sub {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 20px;
      font-family: var(--font-mono);
    }

    .twofa-input-group {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .twofa-input {
      width: 48px;
      height: 56px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      font-family: var(--font-mono);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .twofa-input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(255,59,92,0.08);
    }

    .btn-verify {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--green), #00a854);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-verify:hover { opacity: 0.9; }
    .btn-verify:active { transform: scale(0.98); }
    .btn-verify:disabled { opacity: 0.5; cursor: not-allowed; }

    .back-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.2s;
    }
    .back-btn:hover {
      border-color: var(--red);
      color: var(--red);
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Password toggle */
    .password-wrapper {
      position: relative;
    }
    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
    }
    .password-toggle:hover { color: var(--text); }
  </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>

<div class="login-card">
  <div class="version-badge">V5.0</div>
  
  <div class="logo">
    <div class="logo-icon">🐝</div>
    <div class="logo-text">
      <h1>LADYBUG<span>NODES</span></h1>
      <p>multi-host · whatsapp bots</p>
    </div>
  </div>

  <!-- Login Section -->
  <div class="login-section" id="login-section">
    <div class="login-title">Welcome back</div>
    <div class="login-sub">Sign in to your dashboard</div>

    <form id="login-form" onsubmit="doLogin(event)">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-input" id="username" placeholder="admin" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="password-wrapper">
          <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password" required style="padding-right: 44px;" />
          <button type="button" class="password-toggle" onclick="togglePassword()">👁</button>
        </div>
      </div>
      <button type="submit" class="btn-login" id="login-btn">Sign In</button>
      <div class="error-msg" id="error-msg"></div>
    </form>
  </div>

  <!-- 2FA Section -->
  <div class="twofa-section" id="twofa-section">
    <div class="twofa-title">Two-Factor Authentication</div>
    <div class="twofa-sub">Enter the 6-digit code from your authenticator app</div>

    <form id="twofa-form" onsubmit="verify2FA(event)">
      <div class="twofa-input-group">
        <input type="text" class="twofa-input" id="twofa-1" maxlength="1" pattern="[0-9]" inputmode="numeric" />
        <input type="text" class="twofa-input" id="twofa-2" maxlength="1" pattern="[0-9]" inputmode="numeric" />
        <input type="text" class="twofa-input" id="twofa-3" maxlength="1" pattern="[0-9]" inputmode="numeric" />
        <input type="text" class="twofa-input" id="twofa-4" maxlength="1" pattern="[0-9]" inputmode="numeric" />
        <input type="text" class="twofa-input" id="twofa-5" maxlength="1" pattern="[0-9]" inputmode="numeric" />
        <input type="text" class="twofa-input" id="twofa-6" maxlength="1" pattern="[0-9]" inputmode="numeric" />
      </div>
      <button type="submit" class="btn-verify" id="verify-btn">Verify Code</button>
      <div class="error-msg" id="twofa-error"></div>
    </form>

    <button class="back-btn" onclick="showLogin()">← Back to login</button>
  </div>

  <div class="footer-note">
    LADYBUGNODES &nbsp;•&nbsp; Powered by <a href="https://render.com" target="_blank">Render.com</a>
  </div>
</div>

<script>
  // If already logged in, redirect
  const token = localStorage.getItem('lbn_token');
  if (token) location.href = '/';

  let pendingUsername = null;

  function togglePassword() {
    const input = document.getElementById('password');
    const btn = document.querySelector('.password-toggle');
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = '🙈';
    } else {
      input.type = 'password';
      btn.textContent = '👁';
    }
  }

  async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('error-msg');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in…';
    err.classList.remove('show');

    try {
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const d = await r.json();
      
      if (!r.ok || !d.ok) {
        err.textContent = d.error || 'Login failed';
        err.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
        return;
      }

      // Check if 2FA is required
      if (d.requires2FA) {
        pendingUsername = username;
        show2FA();
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
        return;
      }

      // No 2FA, proceed with login
      localStorage.setItem('lbn_token', d.token);
      localStorage.setItem('lbn_user', JSON.stringify(d.user));
      location.href = '/';
    } catch (ex) {
      err.textContent = 'Network error: ' + ex.message;
      err.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
    }
  }

  function show2FA() {
    document.getElementById('login-section').classList.add('hide');
    document.getElementById('twofa-section').classList.add('show');
    document.getElementById('twofa-1').focus();
  }

  function showLogin() {
    document.getElementById('twofa-section').classList.remove('show');
    document.getElementById('login-section').classList.remove('hide');
    document.getElementById('twofa-error').classList.remove('show');
    clear2FAInputs();
  }

  function clear2FAInputs() {
    for (let i = 1; i <= 6; i++) {
      document.getElementById('twofa-' + i).value = '';
    }
  }

  function get2FACode() {
    let code = '';
    for (let i = 1; i <= 6; i++) {
      code += document.getElementById('twofa-' + i).value;
    }
    return code;
  }

  async function verify2FA(e) {
    e.preventDefault();
    const btn = document.getElementById('verify-btn');
    const err = document.getElementById('twofa-error');
    const code = get2FACode();

    if (code.length !== 6) {
      err.textContent = 'Please enter all 6 digits';
      err.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Verifying…';
    err.classList.remove('show');

    try {
      const r = await fetch('/api/auth/2fa/verify', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + localStorage.getItem('lbn_token')
        },
        body: JSON.stringify({ 
          username: pendingUsername, 
          token: code 
        })
      });
      const d = await r.json();
      
      if (!r.ok || !d.ok) {
        err.textContent = d.error || 'Invalid verification code';
        err.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = 'Verify Code';
        clear2FAInputs();
        document.getElementById('twofa-1').focus();
        return;
      }

      // 2FA successful
      localStorage.setItem('lbn_token', d.token);
      localStorage.setItem('lbn_user', JSON.stringify(d.user));
      location.href = '/';
    } catch (ex) {
      err.textContent = 'Network error: ' + ex.message;
      err.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = 'Verify Code';
    }
  }

  // 2FA input auto-focus
  document.querySelectorAll('.twofa-input').forEach((input, index, inputs) => {
    input.addEventListener('input', (e) => {
      // Only allow numbers
      e.target.value = e.target.value.replace(/[^0-9]/g, '');
      
      // Auto-focus next input
      if (e.target.value && index < inputs.length - 1) {
        inputs[index + 1].focus();
      }
    });

    input.addEventListener('keydown', (e) => {
      // Handle backspace - go to previous input
      if (e.key === 'Backspace' && !e.target.value && index > 0) {
        inputs[index - 1].focus();
      }
    });

    // Handle paste
    input.addEventListener('paste', (e) => {
      e.preventDefault();
      const pastedData = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
      pastedData.split('').forEach((char, i) => {
        if (inputs[i]) {
          inputs[i].value = char;
        }
      });
      if (pastedData.length > 0) {
        inputs[Math.min(pastedData.length, inputs.length - 1)].focus();
      }
    });
  });
</script>
</body>
</html>
