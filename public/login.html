<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LADYBUGNODES · Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0b0e; --surface: #111318; --surface2: #181c22; --border: #1e242e;
      --red: #ff3b5c; --red-dim: rgba(255,59,92,0.12);
      --green: #00e676; --amber: #ffab40; --blue: #40c4ff; --purple: #b388ff;
      --muted: #4a5568; --text: #e2e8f0; --text-dim: #718096;
      --font-mono: 'JetBrains Mono', monospace; --font-sans: 'Syne', sans-serif;
      --radius: 14px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-sans); min-height: 100vh;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(255,59,92,0.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,59,92,0.04) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 48px 48px; } }
    body::after {
      content: ''; position: fixed; top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,59,92,0.08) 0%, transparent 70%);
      pointer-events: none; animation: orbFloat 8s ease-in-out infinite alternate;
    }
    @keyframes orbFloat { 0% { transform: translate(0,0); } 100% { transform: translate(60px,80px); } }

    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 40px;
      width: 100%; max-width: 420px;
      position: relative; z-index: 1;
      box-shadow: 0 0 60px rgba(255,59,92,0.08), 0 24px 48px rgba(0,0,0,0.4);
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .login-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--red), var(--purple), var(--blue));
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .logo { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
    .logo-icon {
      width: 52px; height: 52px; background: var(--red-dim);
      border: 1px solid rgba(255,59,92,0.3); border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 16px rgba(255,59,92,0.2); } 50% { box-shadow: 0 0 32px rgba(255,59,92,0.5); } }
    .logo-text h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .logo-text h1 span { color: var(--red); }
    .logo-text p { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); margin-top: 3px; }

    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block; font-size: 11px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 8px; font-family: var(--font-mono);
    }
    .form-input {
      width: 100%; padding: 13px 16px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: var(--font-mono); font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s; outline: none;
    }
    .form-input:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(255,59,92,0.12); }

    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--red), #e0003c);
      color: #fff; border: none; border-radius: 10px;
      font-family: var(--font-sans); font-size: 15px; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px; letter-spacing: 0.02em;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: rgba(255,59,92,0.1); border: 1px solid rgba(255,59,92,0.3);
      border-radius: 8px; padding: 12px 14px;
      color: var(--red); font-family: var(--font-mono); font-size: 12px;
      margin-bottom: 16px; display: none; align-items: center; gap: 8px;
    }
    .error-msg.show { display: flex; }

    .version-tag {
      text-align: center; margin-top: 20px;
      font-family: var(--font-mono); font-size: 11px; color: var(--muted);
    }
    .version-tag span { color: var(--red); }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.6s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="logo-icon">🐞</div>
    <div class="logo-text">
      <h1>LADYBUG<span>NODES</span></h1>
      <p>multi-host · whatsapp bot dashboard</p>
    </div>
  </div>

  <div class="error-msg" id="error-msg">
    <span>⚠</span>
    <span id="error-text">Invalid credentials</span>
  </div>

  <form id="login-form" onsubmit="doLogin(event)">
    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input class="form-input" type="text" id="username" placeholder="your username" autocomplete="username" required />
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
    </div>
    <button class="btn-login" type="submit" id="login-btn">
      <span id="btn-text">🔑 Sign In</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </form>

  <div class="version-tag">LADYBUGNODES <span>v3.0</span> · powered by <span>MongoDB</span></div>
</div>

<script>
  // Redirect if already logged in
  const tok = localStorage.getItem('lb_token');
  if (tok) {
    const role = localStorage.getItem('lb_role');
    window.location.href = '/';
  }

  async function doLogin(e) {
    e.preventDefault();
    const btn      = document.getElementById('login-btn');
    const spinner  = document.getElementById('spinner');
    const btnText  = document.getElementById('btn-text');
    const errDiv   = document.getElementById('error-msg');
    const errText  = document.getElementById('error-text');

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled   = true;
    spinner.style.display = 'block';
    btnText.textContent   = 'Signing in…';
    errDiv.classList.remove('show');

    try {
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const d = await r.json();

      if (!r.ok) {
        errText.textContent = d.error || 'Login failed';
        errDiv.classList.add('show');
        return;
      }

      localStorage.setItem('lb_token',    d.token);
      localStorage.setItem('lb_username', d.username);
      localStorage.setItem('lb_role',     d.role);

      // Route by role
      if (d.role === 'developer') {
        window.location.href = '/developer.html';
      } else {
        window.location.href = '/';
      }
    } catch (err) {
      errText.textContent = 'Network error — please try again';
      errDiv.classList.add('show');
    } finally {
      btn.disabled          = false;
      spinner.style.display = 'none';
      btnText.textContent   = '🔑 Sign In';
    }
  }
</script>
</body>
</html>
